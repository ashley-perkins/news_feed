name: Daily News Digest

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_and_build.py

      - name: Commit and push dist/
        run: |
          git config --global user.name "aiashley-digest[bot]"
          git config --global user.email "digest-bot@aiashley.io"
          git add dist/
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d')"
          git push
